<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Tracking Container</title>\n</head>\n<body>\n    <h1>Tracking Container</h1>\n    <form id="tracking-form">\n        <label for="container-id">Container ID:</label>\n        <input type="text" id="container-id" name="container-id" required>\n        <button type="submit">Add Container</button>\n    </form>\n    <h2>Tracked Containers</h2>\n    <div id="container-list">\n        <!-- Containers will be displayed here -->\n    </div>\n\n    <script>\n        document.getElementById('tracking-form').addEventListener('submit', function(event) {\n            event.preventDefault();\n            const containerId = document.getElementById('container-id').value;\n            const containerList = document.getElementById('container-list');\n            const containerDiv = document.createElement('div');\n            containerDiv.textContent = 'Tracking Container ID: ' + containerId;\n            containerList.appendChild(containerDiv);\n            document.getElementById('tracking-form').reset();\n        });\n    <\/script>\n</body>\n</html>
